services:
  signaling-server:
    image: ghcr.io/barry-ran/quickdesk-signaling:${IMAGE_TAG:-latest}
    container_name: quickdesk-signaling
    restart: always
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - signaling-data:/data
    env_file:
      - .env

volumes:
  signaling-data:
