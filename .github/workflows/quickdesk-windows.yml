name: QuickDesk Windows

on:
  push:
    paths:
      - 'QuickDesk/**'
      - 'quickdesk-mcp/**'
      - 'quickdesk-virtual-display/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'WebClient/**'
      - 'CMakeLists.txt'
      - '.github/workflows/quickdesk-windows.yml'
  pull_request:
    paths:
      - 'QuickDesk/**'
      - 'quickdesk-mcp/**'
      - 'quickdesk-virtual-display/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'WebClient/**'
      - 'CMakeLists.txt'
      - '.github/workflows/quickdesk-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      QT_VERSION: '6.8.3'
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          cache: true
          modules: 'qtmultimedia qtwebsockets'

      - name: Set Qt path
        shell: bash
        run: echo "ENV_QT_PATH=$(dirname "$QT_ROOT_DIR")" >> $GITHUB_ENV

      - name: Detect VS environment
        shell: pwsh
        run: |
          $vs_install = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
          echo "ENV_VS_INSTALL=$vs_install" >> $env:GITHUB_ENV

          $redist_root = Join-Path $vs_install "VC\Redist\MSVC"
          $latest = Get-ChildItem $redist_root -Directory |
            Where-Object { $_.Name -match '^\d+\.' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          echo "ENV_VCRUNTIME_VERSION=$($latest.Name)" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            quickdesk-mcp/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('quickdesk-mcp/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        shell: cmd
        env:
          ENV_QUICKDESK_API_KEY: ${{ secrets.QUICKDESK_API_KEY }}
        run: call scripts\build_qd_win.bat Release

      - name: Build MCP Bridge
        shell: cmd
        run: call scripts\build_mcp_win.bat Release

      - name: Build Skill Host
        shell: cmd
        run: call scripts\build_skill_host_win.bat Release

      - name: Build WebClient
        shell: cmd
        run: call scripts\build_webclient_win.bat

      - name: Check VDD solution exists
        id: vdd-check
        shell: pwsh
        run: |
          if (Test-Path "quickdesk-virtual-display\quickdesk-virtual-display.sln") {
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::VDD solution not found, skipping driver build"
          }

      - name: Install WDK
        if: steps.vdd-check.outputs.exists == 'true'
        shell: pwsh
        run: choco install windowsdriverkit11 -y --no-progress

      - name: Build Virtual Display Driver
        if: steps.vdd-check.outputs.exists == 'true'
        shell: cmd
        run: call scripts\build_vdd_win.bat Release

      - name: Publish
        shell: cmd
        run: call scripts\publish_qd_win.bat Release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Package installer
        shell: cmd
        run: call scripts\package_qd_win.bat Release

      - name: Get version
        id: version
        shell: bash
        run: |
          echo "version=$(cat version)" >> $GITHUB_OUTPUT
          echo "ref-name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDesk-win-x64-${{ steps.version.outputs.ref-name }}
          path: publish/QuickDesk-win-x64-setup.exe

      - name: Upload WebClient artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDesk-WebClient-${{ steps.version.outputs.ref-name }}
          path: WebClient/dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: publish/QuickDesk-win-x64-setup.exe
          asset_name: QuickDesk-win-x64-${{ steps.version.outputs.ref-name }}-setup.exe
          tag: ${{ github.ref }}
          overwrite: true
